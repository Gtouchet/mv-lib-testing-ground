<div class="configuration">

    <!-- Styles -->
    <div class="styles">
        <b [style.align-self]="'center'">
            Styles
        </b>
        <b>
            Success
        </b>
        <app-input-number
            [value]="successConfiguration().forcedWidthPx"
            label="Width px"
            (onChange)="successConfiguration.update(c => ({ ...c, forcedWidthPx: $event }))"
        />
        <app-input-number
            [value]="successConfiguration().forcedHeightPx"
            label="Height px"
            (onChange)="successConfiguration.update(c => ({ ...c, forcedHeightPx: $event }))"
        />
        <app-input-text
            [value]="successConfiguration().icon"
            label="Icon"
            [widthPx]="150"
            (onChange)="successConfiguration.update(c => ({ ...c, icon: $event }))"
        />
        <app-input-text
            [value]="successConfiguration().text"
            label="Text"
            [widthPx]="150"
            (onChange)="successConfiguration.update(c => ({ ...c, text: $event }))"
        />
        <app-input-color
            [value]="successConfiguration().backgroundColor"
            label="Background color"
            (onChange)="
                successConfiguration.update(c => ({ ...c, backgroundColor: $event }));
                toastService.setStyle('success', 'backgroundColor', $event);
            "
        />
        <app-input-color
            [value]="successConfiguration().textColor"
            label="Text color"
            (onChange)="
                successConfiguration.update(c => ({ ...c, textColor: $event }));
                toastService.setStyle('success', 'textColor', $event);
            "
        />
        <app-input-color
            [value]="successConfiguration().hoveredOutlineColor"
            label="Hovered outline color"
            (onChange)="
                successConfiguration.update(c => ({ ...c, hoveredOutlineColor: $event }));
                toastService.setStyle('success', 'hoveredOutlineColor', $event);
            "
        />
        <b>
            Warning
        </b>
        <app-input-number
            [value]="warningConfiguration().forcedWidthPx"
            label="Width px"
            (onChange)="warningConfiguration.update(c => ({ ...c, forcedWidthPx: $event }))"
        />
        <app-input-number
            [value]="warningConfiguration().forcedHeightPx"
            label="Height px"
            (onChange)="warningConfiguration.update(c => ({ ...c, forcedHeightPx: $event }))"
        />
        <app-input-text
            [value]="warningConfiguration().icon"
            label="Icon"
            [widthPx]="150"
            (onChange)="warningConfiguration.update(c => ({ ...c, icon: $event }))"
        />
        <app-input-text
            [value]="warningConfiguration().text"
            label="Text"
            [widthPx]="150"
            (onChange)="warningConfiguration.update(c => ({ ...c, text: $event }))"
        />
        <app-input-color
            [value]="warningConfiguration().backgroundColor"
            label="Background color"
            (onChange)="
                warningConfiguration.update(c => ({ ...c, backgroundColor: $event }));
                toastService.setStyle('warning', 'backgroundColor', $event);
            "
        />
        <app-input-color
            [value]="warningConfiguration().textColor"
            label="Text color"
            (onChange)="
                warningConfiguration.update(c => ({ ...c, textColor: $event }));
                toastService.setStyle('warning', 'textColor', $event);
            "
        />
        <app-input-color
            [value]="warningConfiguration().hoveredOutlineColor"
            label="Hovered outline color"
            (onChange)="
                warningConfiguration.update(c => ({ ...c, hoveredOutlineColor: $event }));
                toastService.setStyle('warning', 'hoveredOutlineColor', $event);
            "
        />
        <b>
            Error
        </b>
        <app-input-number
            [value]="errorConfiguration().forcedWidthPx"
            label="Width px"
            (onChange)="errorConfiguration.update(c => ({ ...c, forcedWidthPx: $event }))"
        />
        <app-input-number
            [value]="errorConfiguration().forcedHeightPx"
            label="Height px"
            (onChange)="errorConfiguration.update(c => ({ ...c, forcedHeightPx: $event }))"
        />
        <app-input-text
            [value]="errorConfiguration().icon"
            label="Icon"
            [widthPx]="150"
            (onChange)="errorConfiguration.update(c => ({ ...c, icon: $event }))"
        />
        <app-input-text
            [value]="errorConfiguration().text"
            label="Text"
            [widthPx]="150"
            (onChange)="errorConfiguration.update(c => ({ ...c, text: $event }))"
        />
        <app-input-color
            [value]="errorConfiguration().backgroundColor"
            label="Background color"
            (onChange)="
                errorConfiguration.update(c => ({ ...c, backgroundColor: $event }));
                toastService.setStyle('error', 'backgroundColor', $event);
            "
        />
        <app-input-color
            [value]="errorConfiguration().textColor"
            label="Text color"
            (onChange)="
                errorConfiguration.update(c => ({ ...c, textColor: $event }));
                toastService.setStyle('error', 'textColor', $event);
            "
        />
        <app-input-color
            [value]="errorConfiguration().hoveredOutlineColor"
            label="Hovered outline color"
            (onChange)="
                errorConfiguration.update(c => ({ ...c, hoveredOutlineColor: $event }));
                toastService.setStyle('error', 'hoveredOutlineColor', $event);
            "
        />
        <b>
            Info
        </b>
        <app-input-number
            [value]="infoConfiguration().forcedWidthPx"
            label="Width px"
            (onChange)="infoConfiguration.update(c => ({ ...c, forcedWidthPx: $event }))"
        />
        <app-input-number
            [value]="infoConfiguration().forcedHeightPx"
            label="Height px"
            (onChange)="infoConfiguration.update(c => ({ ...c, forcedHeightPx: $event }))"
        />
        <app-input-text
            [value]="infoConfiguration().icon"
            label="Icon"
            [widthPx]="150"
            (onChange)="infoConfiguration.update(c => ({ ...c, icon: $event }))"
        />
        <app-input-text
            [value]="infoConfiguration().text"
            label="Text"
            [widthPx]="150"
            (onChange)="infoConfiguration.update(c => ({ ...c, text: $event }))"
        />
        <app-input-color
            [value]="infoConfiguration().backgroundColor"
            label="Background color"
            (onChange)="
                infoConfiguration.update(c => ({ ...c, backgroundColor: $event }));
                toastService.setStyle('info', 'backgroundColor', $event);
            "
        />
        <app-input-color
            [value]="infoConfiguration().textColor"
            label="Text color"
            (onChange)="
                infoConfiguration.update(c => ({ ...c, textColor: $event }));
                toastService.setStyle('info', 'textColor', $event);
            "
        />
        <app-input-color
            [value]="infoConfiguration().hoveredOutlineColor"
            label="Hovered outline color"
            (onChange)="
                infoConfiguration.update(c => ({ ...c, hoveredOutlineColor: $event }));
                toastService.setStyle('info', 'hoveredOutlineColor', $event);
            "
        />
    </div>

    <!-- Effects -->
    <div class="effects">
        <b [style.align-self]="'center'">
            Effects
        </b>
        <b>
            Idle
        </b>
        <app-input-checkbox
            [checked]="idleEffect_progressBar()"
            label="Progress bar"
            (toggled)="
                idleEffect_progressBar.set($event);
                toastService.setEffect('progress-bar', $event);
            "
        />
        <b>
            Hover
        </b>
        <app-input-checkbox
            [checked]="hoverEffect_hoverOutlineSolid()"
            label="Outline solid"
            (toggled)="
                hoverEffect_hoverOutlineSolid.set($event);
                toastService.setEffect('hover-outline-solid', $event);
            "
        />
        <app-input-checkbox
            [checked]="hoverEffect_hoverOutlineBlur()"
            label="Outline blur"
            (toggled)="
                hoverEffect_hoverOutlineBlur.set($event);
                toastService.setEffect('hover-outline-blur', $event);
            "
        />
        <b>
            Lifecycle
        </b>
        <app-input-checkbox
            [checked]="lifecycleEffect_fade()"
            label="Fade"
            (toggled)="
                lifecycleEffect_fade.set($event);
                toastService.setEffect('fade', $event);
            "
        />
        <app-input-checkbox
            [checked]="lifecycleEffect_slide()"
            label="Slide"
            (toggled)="
                lifecycleEffect_slide.set($event);
                toastService.setEffect('slide', $event);
            "
        />
    </div>

    <!-- Settings -->
    <div class="settings">
        <b [style.align-self]="'center'">
            Settings
        </b>
        <b>
            Position
        </b>
        <app-input-radio
            [values]="['top-left', 'top-right', 'bottom-left', 'bottom-right']"
            [selected]="position()"
            (onChange)="
                position.set($any($event));
                toastService.setPosition(position());
            "
        />
        <b>
            Lifespans (ms)
        </b>
        <app-input-number
            [value]="lifespan_success()"
            label="Success"
            [widthPx]="65"
            (onChange)="
                lifespan_success.set($event);
                toastService.setSetting('lifespan', lifespan_success());
            "
        />
        <app-input-number
            [value]="lifespan_warning()"
            label="Warning"
            [widthPx]="65"
            (onChange)="
                lifespan_warning.set($event);
                toastService.setSetting('lifespan', lifespan_warning());
            "
        />
        <app-input-number
            [value]="lifespan_error()"
            label="Error"
            [widthPx]="65"
            (onChange)="
                lifespan_error.set($event);
                toastService.setSetting('lifespan', lifespan_error());
            "
        />
        <app-input-number
            [value]="lifespan_info()"
            label="Info"
            [widthPx]="65"
            (onChange)="
                lifespan_info.set($event);
                toastService.setSetting('lifespan', lifespan_info());
            "
        />
    </div>
</div>

<div class="visual">
    <div
        class="component"
        [style.gap.px]="8"
    >
        <mv-lib-button-classic
            [styles]="{
                widthPx: 100,
                backgroundColor: successConfiguration().backgroundColor,
            }"
            (onClick)="toastService.success(
                successConfiguration().text,
                successConfiguration().icon,
                {
                    widthPx: successConfiguration().forcedWidthPx,
                    heightPx: successConfiguration().forcedHeightPx,
                }
            )"
        >
            <span [style.color]="successConfiguration().textColor">
                Success
            </span>
        </mv-lib-button-classic>

        <mv-lib-button-classic
            [styles]="{
                widthPx: 100,
                backgroundColor: warningConfiguration().backgroundColor,
            }"
            (onClick)="toastService.warning(
                warningConfiguration().text,
                warningConfiguration().icon,
                {
                    widthPx: warningConfiguration().forcedWidthPx,
                    heightPx: warningConfiguration().forcedHeightPx,
                }
            )"
        >
            <span [style.color]="warningConfiguration().textColor">
                Warning
            </span>
        </mv-lib-button-classic>

        <mv-lib-button-classic
           [styles]="{
                widthPx: 100,
                backgroundColor: errorConfiguration().backgroundColor,
            }"
            (onClick)="toastService.error(
                errorConfiguration().text,
                errorConfiguration().icon,
                {
                    widthPx: errorConfiguration().forcedWidthPx,
                    heightPx: errorConfiguration().forcedHeightPx,
                }
            )"
        >
            <span [style.color]="errorConfiguration().textColor">
                Error
            </span>
        </mv-lib-button-classic>

        <mv-lib-button-classic
           [styles]="{
                widthPx: 100,
                backgroundColor: infoConfiguration().backgroundColor,
            }"
            (onClick)="toastService.info(
                infoConfiguration().text,
                infoConfiguration().icon,
                {
                    widthPx: infoConfiguration().forcedWidthPx,
                    heightPx: infoConfiguration().forcedHeightPx,
                }
            )"
        >
            <span [style.color]="infoConfiguration().textColor">
                Info
            </span>
        </mv-lib-button-classic>
    </div>

<pre class="log">
Last interaction time: {{ lastInteractionTime() }}<br/>
input: {{ form.get('input')?.value }}<br/>
{{ log() }}
</pre>
</div>
