<div class="configuration">
    <!-- Styles -->
    <div class="styles">
        <b class="title">
            Styles
        </b>
        <div>
            <input
                type="number"
                [value]="styles().widthPx"
                (input)="updateStyle('widthPx', $event)"
            />
            Width px
        </div>

        <div>
            <input
                type="number"
                [value]="styles().heightPx"
                (input)="updateStyle('heightPx', $event)"
            />
            Height px
        </div>

        <div>
            <input
                type="color"
                [value]="styles().backgroundColor"
                (input)="updateStyle('backgroundColor', $event)"
            />
            Background color
        </div>

        <div>
            <input
                type="color"
                [value]="styles().textColor"
                (input)="updateStyle('textColor', $event)"
            />
            Text color
        </div>
    </div>

    <!-- Effects -->
    <div class="effects">
        <b class="title">
            Effects
        </b>
        <div>
            <b>
                Idle
            </b>
            <app-input-checkbox
                [checked]="!!effects().idle?.includes('shadow')"
                label="Shadow"
                (toggled)="updateEffect('idle', 'shadow', $event)"
            />
        </div>

        <div>
            <b>
                Hover
            </b>
            <app-input-checkbox
                [checked]="!!effects().hover?.includes('darken')"
                label="Darken"
                (toggled)="updateEffect('hover', 'darken', $event)"
            />
        </div>

        <div>
            <b>
                Click
            </b>
            <app-input-checkbox
                [checked]="!!effects().click?.includes('push')"
                label="Push"
                (toggled)="updateEffect('click', 'push', $event)"
            />

            <app-input-checkbox
                [checked]="!!effects().click?.includes('ripple')"
                label="Ripple"
                (toggled)="updateEffect('click', 'ripple', $event)"
            />
        </div>
    </div>

    <!-- Settings -->
    <div class="settings">
        <b class="title">
            Settings
        </b>
        <div>
            <input
                type="checkbox"
                [checked]="disabled()"
                (click)="
                    disabled.set(!disabled());
                    refreshLog();
                "
            />
            Disabled
        </div>
    </div>
</div>

<div class="visual">
    <mv-lib-button-classic
        class="component"
        [styles]="styles()"
        [effects]="effects()"
        [settings]="settings()"
        [disabled]="disabled()"
        (onClick)="refreshLastInteractionTime()"
    >
        <div
            [style.display]="'flex'"
            [style.align-items]="'center'"
        >
        </div>
        <span class="material-symbols-outlined">
            touch_app
        </span>
        <span [style.font-weight]="'bold'">
            Click
        </span>
    </mv-lib-button-classic>

<pre class="log">
Last interaction time: {{ lastInteractionTime() }}<br/>
{{ log() }}
</pre>
</div>
