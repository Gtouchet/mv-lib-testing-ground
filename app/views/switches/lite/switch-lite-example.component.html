<div class="configuration">

    <!-- Styles -->
    <div class="styles">
        <b [style.align-self]="'center'">
            Styles
        </b>
        <div>
            <input
                type="number"
                [value]="styles().widthPx ?? ''"
                (input)="updateStyle('widthPx', $event)"
            />
            Width px
        </div>

        <div>
            <input
                type="number"
                [value]="styles().heightPx ?? ''"
                (input)="updateStyle('heightPx', $event)"
            />
            Height px
        </div>

        <div>
            <input
                type="number"
                [value]="styles().cursorSizePx ?? ''"
                (input)="updateStyle('cursorSizePx', $event)"
            />
            Cursor size px
        </div>

        <div>
            <input
                type="color"
                [value]="styles().trackColorOn"
                (input)="updateStyle('trackColorOn', $event)"
            />
            Track color on
        </div>

        <div>
            <input
                type="color"
                [value]="styles().cursorColorOn"
                (input)="updateStyle('cursorColorOn', $event)"
            />
            Cursor color on
        </div>

        TODO icons on

        <div>
            <input
                type="color"
                [value]="styles().trackColorOff"
                (input)="updateStyle('trackColorOff', $event)"
            />
            Track color off
        </div>

        <div>
            <input
                type="color"
                [value]="styles().cursorColorOff"
                (input)="updateStyle('cursorColorOff', $event)"
            />
            Cursor color off
        </div>

        TODO icons off
    </div>

    <!-- Effects -->
    <div class="effects">
        <div>
            <b [style.align-self]="'center'">
                Idle effects
            </b>
            <app-input-checkbox
                [checked]="!!effects().idle?.includes('shadow')"
                label="Shadow"
                (toggled)="updateEffect('idle', 'shadow', $event)"
            />
        </div>

        <div>
            <b>
                Hover effects
            </b>
            <app-input-checkbox
                [checked]="!!effects().hover?.includes('enlarge-cursor')"
                label="Enlarge cursor"
                (toggled)="updateEffect('hover', 'enlarge-cursor', $event)"
            />
        </div>

        <div>
            <b>
                Click effects
            </b>
            <app-input-checkbox
                [checked]="!!effects().click?.includes('push')"
                label="Push"
                (toggled)="updateEffect('click', 'push', $event)"
            />

            <app-input-checkbox
                [checked]="!!effects().click?.includes('ripple')"
                label="Ripple"
                (toggled)="updateEffect('click', 'ripple', $event)"
            />
        </div>
    </div>

    <!-- Settings -->
    <div class="settings">
        <b [style.align-self]="'center'">
            Settings
        </b>
        <div>
            <input
                type="checkbox"
                [checked]="disabled()"
                (click)="
                    disabled.set(!disabled());
                    refreshLog();
                "
            />
            Disabled
        </div>
        <div>
            <input
                type="checkbox"
                [checked]="active()"
                (click)="
                    active.set(!active());
                    refreshLastInteractionTime();
                    refreshLog();
                "
            />
            Activated
        </div>
    </div>
</div>

<div class="visual">
    <mv-lib-switch-lite
        class="component"
        [styles]="styles()"
        [effects]="effects()"
        [settings]="settings()"
        [disabled]="disabled()"
        [active]="active()"
        (onToggle)="
            active.set($event.active);
            refreshLastInteractionTime();
            refreshLog();
        "
    />

<pre class="log">
Last interaction time: {{ lastInteractionTime() }}<br/>
{{ log() }}
</pre>
</div>
