<label
  [ngClass]="computedToggleClasses()"
  [class.disabled]="disabled()"
  [class.enabled]="!disabled()"

  [style.height.px]="computedStyles().heightPx"
  [style.width.px]="computedStyles().widthPx"
  [style.--translate-distance.px]="computedStyles().widthPx"
  (click)="handleToggle($event)"
>
  <input
    type="checkbox"

    class="checkbox"
    [style.visibility]="'hidden'"
    [disabled]="disabled()"
    [checked]="active()"
  />
  <span
    [ngClass]="computedSliderClasses()"
    [class.disabled]="disabled()"
    [class.enabled]="!disabled()"
    
    [style.height.px]="computedStyles().heightPx!"
    [style.width.px]="computedStyles().widthPx!"
    [style.border-radius.px]="computedStyles().heightPx"
    [style.--slider-before-height]="(computedStyles().heightPx! - 8) + 'px'"
    [style.--slider-on-color]="computedStyles().onColor"
    [style.--slider-off-color]="computedStyles().offColor"
    [style.--slider-before-color]="active() ? computedStyles().sliderOnColor : computedStyles().sliderOffColor"
    [style.--thumb-hover-scale]="computedSliderHoverScale()"
    [style.--translate-distance]="(computedStyles().widthPx! - computedStyles().heightPx!) + 'px'"
  >
    <span 
      class="material-symbols-outlined slider-icon"
      [style.color]="active() ? computedStyles().sliderOnIconColor : computedStyles().sliderOffIconColor"
    >
      {{ active() ? computedStyles().sliderOnIcon : computedStyles().sliderOffIcon }}
    </span>
  </span>
</label>
