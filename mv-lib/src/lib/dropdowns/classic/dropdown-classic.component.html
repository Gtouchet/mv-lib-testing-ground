<div
    #dropdownRoot
    class="root"
>
    <button
        #dropdownButton
        [ngClass]="computedButtonClasses()"
        [class.disabled]="disabled()"
        [class.enabled]="!disabled()"

        [style.width.px]="computedStyles().widthPx"
        [style.height.px]="computedStyles().buttonHeightPx"
        [style.background-color]="computedStyles().buttonColor"
        [style.color]="computedStyles().buttonTextColor"
        [disabled]="disabled()"
        (click)="
            isOpen.set(!isOpen());
            onOpen.emit({
                opened: isOpen(),
                event: $event,
            });
        "
    >
        <span class="hide-overflow">
            @if (selectedItem()) {
                <span class="hide-overflow">
                    @if (selectedTemplate()) {
                        <ng-container
                            [ngTemplateOutlet]="selectedTemplate()!.templateRef"
                            [ngTemplateOutletContext]="{ $implicit: selectedItem() }"
                        />
                    } @else {
                        {{ selectedItem() }}
                    }
                </span>
            } @else {
                @if (placeholderTemplate()) {
                    <ng-container
                        [ngTemplateOutlet]="placeholderTemplate()!.templateRef"
                    />
                }
            }
        </span>
        <span class="material-symbols-outlined">
            {{ isOpen() ? 'keyboard_arrow_up' : 'keyboard_arrow_down' }}
        </span>
    </button>

    @if (isOpen()) {
        <ul
            [ngClass]="computedListClasses()"
            [class.disabled]="disabled()"
            [class.enabled]="!disabled()"

            [style.width.px]="computedStyles().widthPx"
            [style.max-height.px]="computedStyles().listMaxHeightPx"
        >
            @for (item of items(); track item) {
                <li>
                    <button
                        [ngClass]="computedItemClasses()"
                        [class.disabled]="disabled()"
                        [class.enabled]="!disabled()"
                        
                        [style.height.px]="computedStyles().itemHeightPx"
                        [style.--background-color]="computedStyles().itemColor"
                        [style.color]="computedStyles().itemTextColor"
                        (click)="selectItem(item, $event)"
                    >
                        <div class="hide-overflow">
                            @if (itemTemplate()) {
                                <ng-container
                                    [ngTemplateOutlet]="itemTemplate()!.templateRef"
                                    [ngTemplateOutletContext]="{ $implicit: item }"
                                />
                            } @else {
                                {{ item }}
                            }
                        </div>
                    </button>
                </li>
            }
        </ul>
    }
</div>
