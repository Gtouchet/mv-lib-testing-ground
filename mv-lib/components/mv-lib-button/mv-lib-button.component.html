<button
    [ngClass]="computedClasses()"
    
    [style.--background-color]="computedSettings().backgroundColor"
    [style.width.px]="computedSettings().widthPx"
    [style.height.px]="computedSettings().heightPx"
    [style.color]="computedSettings().textColor"

    [disabled]="disabled()"
    (click)="onClick.emit({
        settings: computedSettings(),
        effects: computedEffects(),
        event: $event,
    })"
>
    <ng-content />
</button>
