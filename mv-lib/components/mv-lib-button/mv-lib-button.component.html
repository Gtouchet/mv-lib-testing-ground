<button
    [ngClass]="[
        'mv-lib-button',
        computedSettings().onClickEffect,
    ]"

    [style.width.px]="computedSettings().widthPx"
    [style.height.px]="computedSettings().heightPx"

    [style.background-color]="hover() ? computedSettings().hoverBackgroundColor : computedSettings().backgroundColor"
    [style.color]="computedSettings().textColor"
    [style.border]="computedSettings().border"

    [disabled]="disabled()"

    (click)="onClick.emit($event)"

    (mouseenter)="hover.set(true)"
    (mouseleave)="hover.set(false)"
>
    <ng-content />
</button>
