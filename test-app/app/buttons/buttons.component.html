<!-- Settings -->
<div
    [style.display]="'flex'"
    [style.flex-direction]="'column'"
>
    <b>
        Settings
    </b>
    <div
        [style.display]="'flex'"
        [style.align-items]="'center'"
        [style.margin-left.px]="-4"
    >
        <input
            type="checkbox"
            [checked]="disabled()"
            (click)="
                disabled.set(!disabled());
                refreshLog();
            "
        />
        Disabled
    </div>
    <div
        [style.display]="'flex'"
        [style.align-items]="'center'"
    >
        <input
            type="number"
            [value]="buttonSettings().widthPx ?? ''"
            (input)="updateSetting('widthPx', $event)"
            [style.width.px]="50"
            [style.margin-top.px]="4"
            [style.margin-right.px]="4"
        />
        WidthPx
    </div>

    <div
        [style.display]="'flex'"
        [style.align-items]="'center'"
    >
        <input
            type="number"
            [value]="buttonSettings().heightPx ?? ''"
            (input)="updateSetting('heightPx', $event)"
            [style.width.px]="50"
            [style.margin-top.px]="4"
            [style.margin-right.px]="4"
        />
        HeightPx
    </div>

    <div
        [style.display]="'flex'"
        [style.align-items]="'center'"
        [style.margin-top.px]="4"
    >
        <input
            type="color"
            [value]="buttonSettings().backgroundColor"
            (input)="updateSetting('backgroundColor', $event)"
            [style.width.px]="58"
            [style.height.px]="24"
            [style.margin-right.px]="4"
        />
        Background color
    </div>

    <div
        [style.display]="'flex'"
        [style.align-items]="'center'"
        [style.margin-top.px]="4"
    >
        <input
            type="color"
            [value]="buttonSettings().textColor"
            (input)="updateSetting('textColor', $event)"
            [style.width.px]="58"
            [style.height.px]="24"
            [style.margin-right.px]="4"
        />
        Text color
    </div>
</div>

<!-- Effects -->
<div
    [style.display]="'flex'"
    [style.gap.px]="16"
    [style.margin-top.px]="8"
>
    <div
        [style.display]="'flex'"
        [style.flex-direction]="'column'"
        [style.margin-bottom.px]="8"
    >
        <b>
            Idle effects
        </b>
        <div
            [style.display]="'flex'"
            [style.align-items]="'center'"
        >
            <input
                type="checkbox"
                effect="idle.shadow"
                [checked]="buttonEffects().idle?.includes('shadow')"
                (click)="updateEffect($event)"
            />
            Shadow
        </div>
    </div>

    <div
        [style.display]="'flex'"
        [style.flex-direction]="'column'"
        [style.margin-bottom.px]="8"
    >
        <b>
            Hover effects
        </b>
        <div
            [style.display]="'flex'"
            [style.align-items]="'center'"
        >
            <input
                type="checkbox"
                effect="hover.darken"
                [checked]="buttonEffects().hover?.includes('darken')"
                (click)="updateEffect($event)"
            />
            Darken
        </div>
    </div>

    <div
        [style.display]="'flex'"
        [style.flex-direction]="'column'"
        [style.margin-bottom.px]="8"
    >
        <b>
            Click effects
        </b>
        <div
            [style.display]="'flex'"
            [style.align-items]="'center'"
        >
            <input
                type="checkbox"
                effect="click.push"
                [checked]="buttonEffects().click?.includes('push')"
                (click)="updateEffect($event)"
            />
            Push
        </div>

        <div
            [style.display]="'flex'"
            [style.align-items]="'center'"
        >
            <input
                type="checkbox"
                effect="click.ripple"
                [checked]="buttonEffects().click?.includes('ripple')"
                (click)="updateEffect($event)"
            />
            Ripple
        </div>
    </div>
</div>

<!-- Button -->
<div
    [style.margin-top.px]="8"
    [style.margin-bottom.px]="8"
>
    <mv-lib-button
        [settings]="buttonSettings()"
        [effects]="buttonEffects()"
        [disabled]="disabled()"
        (onClick)="setLastClickedTime()"
    >
        <span class="material-symbols-outlined">
            touch_app
        </span>
        <span [style.font-weight]="'bold'">
            Click
        </span>
    </mv-lib-button>
</div>

<!-- Log -->
<span
    [style.white-space]="'pre-wrap'"
>
    {{ log() }}
</span>
