<div>
    <header>
        <div
            [style.display]="'flex'"
            [style.align-items]="'left'"
            [style.gap.px]="8"
        >
            <mv-lib-button
                routerLink="/"
                [settings]="{
                    backgroundColor: 'var(--button-blue-color)',
                }"
            >
                <span class="material-symbols-outlined">
                    home
                </span>
            </mv-lib-button>

            <mv-lib-button
                routerLink="/buttons"
                [settings]="{
                    backgroundColor: 'var(--button-blue-color)',
                }"
            >
                <span
                    [style.font-weight]="'bold'"
                >
                    Buttons
                </span>
            </mv-lib-button>

            <mv-lib-button
                routerLink="/switches"
                [settings]="{
                    backgroundColor: 'var(--button-blue-color)',
                }"
            >
                <span
                    [style.font-weight]="'bold'"
                >
                    Switches
                </span>
            </mv-lib-button>
        </div>

        <hr
            [style.margin-left.px]="-8"
            [style.margin-right.px]="-8"
        />
    </header>

    <main>
        <router-outlet />
    </main>
</div>
